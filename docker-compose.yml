version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: dvp
    volumes:
      - ./data/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d dvp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: dvp-backend:latest
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:apppass@db/dvp
      SECRET_KEY: ${SECRET_KEY:-changeme-dev-only}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend-reports:/app/reports

  frontend:
    image: dvp-frontend:latest
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-reports:

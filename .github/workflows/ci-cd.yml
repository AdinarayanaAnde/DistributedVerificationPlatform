name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip
        cache-dependency-path: backend/pyproject.toml
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run tests
      run: |
        cd backend
        python -m pytest -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    - name: Type check
      run: |
        cd frontend
        npx tsc --noEmit
    - name: Build
      run: |
        cd frontend
        npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
    - uses: actions/checkout@v6
    - name: Build Docker images
      run: |
        docker compose build

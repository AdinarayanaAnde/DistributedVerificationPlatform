apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvf-frontend
  labels:
    app: dvf-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvf-frontend
  template:
    metadata:
      labels:
        app: dvf-frontend
    spec:
      containers:
      - name: frontend
        image: dvf-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dvf-frontend
  labels:
    app: dvf-frontend
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: dvf-frontend
  type: LoadBalancer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvf-backend
  labels:
    app: dvf-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvf-backend
  template:
    metadata:
      labels:
        app: dvf-backend
    spec:
      containers:
      - name: backend
        image: dvf-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://dvf:password@dvf-postgres:5432/dvf"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: secret-key
              optional: true
        - name: CORS_ORIGINS
          value: "https://dvf.example.com"
        - name: SMTP_SERVER
          value: "smtp.gmail.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-secret
              key: password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dvf-backend
  labels:
    app: dvf-backend
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: dvf-backend
  type: ClusterIP